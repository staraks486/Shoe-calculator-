# PLACE THIS FILE AT: .github/workflows/main.yml
# GitHub will only run workflows if they are in the .github/workflows folder.

name: CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Use top-level env to ensure every step in every job inherits the Node 24 requirement
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up Node.js for your application logic
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Removed 'cache: npm' because no lock file was found.
          # This prevents the "Dependencies lock file is not found" error.

      # Step 3: Application build steps
      - name: Install Dependencies
        run: |
          if [ -f package.json ]; then
            npm install
          else
            echo "No package.json found, skipping npm install."
          fi

      - name: Run Build
        run: npm run build --if-present

      # Step 4: Upload Artifacts
      # Adjusted path to '*' or a common folder if index.html is missing
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .
